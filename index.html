<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devashish Sharma | Interactive IK Robotics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <div class="hero-left">
      <h1>DEVASHISH SHARMA</h1>
      <p>Automation | Robotics | Mechatronics</p>

      <div class="factory-cell">
        <canvas id="robotCanvas" width="800" height="500"></canvas>
      </div>
    </div>

    <div class="teach-pendant">
      <div class="screen">
        <div class="screen-title">FANUC TP - IK MODE</div>
        <div id="statusText">READY</div>
        <div id="coordText">X: 0 | Y: 0</div>
      </div>
      <div class="button-grid">
        <button onclick="setTarget('education')">EDUCATION</button>
        <button onclick="setTarget('projects')">PROJECTS</button>
        <button onclick="setTarget('experience')">EXPERIENCE</button>
        <button onclick="setTarget('skills')">SKILLS</button>
        <button onclick="setTarget('contact')">CONTACT</button>
      </div>
      <button class="emergency" onclick="triggerEStop()">EMERGENCY STOP</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
